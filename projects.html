<!DOCTYPE html>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;

    margin: 5% auto;
    padding: 25px;

.close {
    float: right;
    font-size: 26px;
    cursor: pointer;

img {
    width: 100%;
    max-width: 750px;
    border-radius: 12px;
    margin-top: 10px;

    background: #020617;
    padding: 12px;
    border-radius: 8px;
}

<body>

<section>

<h1>Projects</h1>

<div class="card" onclick="openProject('drainage')">
<h2>Smart Drainage System</h2>
<p>Dual Arduino + I2C + Ultrasonic + GSM</p>
</div>

<div class="card" onclick="openProject('earthquake')">
<h2>Earthquake Detection System</h2>
<p>Arduino + Vibration Sensor</p>
</div>

</section>

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<div id="modal-body"></div>
</div>
</div>

<script>

function openProject(type){

let content="";

if(type==="drainage"){
content=`
<h2>Smart Drainage System (Dual Arduino - I2C)</h2>

<p>
An intelligent drainage monitoring system designed to detect overflow conditions in real-time. 
The system uses ultrasonic sensing to measure water levels and sends alerts via GSM when critical thresholds are reached.
</p>

<h3>Why Dual Arduino?</h3>
<p>
Using two Arduino boards separates sensing and communication tasks. 
The Slave Arduino handles precise ultrasonic timing, while the Master Arduino manages GSM communication, 
improving reliability and reducing processing delays.
</p>

<h3>System Architecture</h3>
<p>
• Slave Arduino → Water level sensing (HC-SR04)<br>
• Master Arduino → Decision making + GSM alert + buzzer<br>
• Communication → I2C protocol (SDA, SCL)
</p>

<h3>Circuit Diagram</h3>
<div style="text-align:center;">
<img src="images/drainage.png">
</div>

<h3>Pin Connections</h3>
<pre>
ULTRASONIC (Slave Arduino)
VCC  → 5V
GND  → GND
TRIG → D9
ECHO → D10

I2C COMMUNICATION
SDA → A4 (both Arduinos)
SCL → A5 (both Arduinos)
GND → Common

GSM (Master Arduino)
TX → D7 (RX)
RX → D6 (TX)
VCC → External 5V
GND → GND

BUZZER (Master)
+ → D8
- → GND
</pre>

<h3>Working Principle</h3>
<p>
The ultrasonic sensor continuously measures the distance to the water surface. 
This data is transmitted via I2C from the Slave Arduino to the Master Arduino. 
If the water level exceeds a predefined threshold, the Master Arduino activates the buzzer 
and sends an alert message using the GSM module.
</p>

<h3>Key Features</h3>
<p>
• Real-time water level monitoring<br>
• Remote alert system via GSM<br>
• Modular design using I2C communication<br>
• Reliable multi-controller architecture
</p>

<h3>Advantages</h3>
<p>
• Faster processing due to task separation<br>
• Scalable system design<br>
• Improved fault tolerance<br>
• Suitable for urban drainage systems
</p>

<h3>Limitations</h3>
<p>
• Requires stable power supply for GSM module<br>
• Slight increase in hardware complexity<br>
• Calibration needed for accurate sensing
</p>

<h3>Future Improvements</h3>
<p>
• IoT integration (cloud monitoring)<br>
• Mobile app alerts<br>
• Solar-powered deployment<br>
• AI-based flood prediction
</p>
`;
}

if(type==="earthquake"){
content=`
<h2>Earthquake Detection System</h2>

<p>
A simple and effective system designed to detect ground vibrations using a vibration sensor 
and alert users through a buzzer mechanism.
</p>

<h3>System Overview</h3>
<p>
The system continuously monitors vibrations in the environment. 
When the detected vibration exceeds a certain threshold, it triggers an alert.
</p>

<h3>Circuit Diagram</h3>
<div style="text-align:center;">
<img src="images/earthquake.png">
</div>

<h3>Pin Connections</h3>
<pre>
Vibration Sensor (SW-420)
VCC → 5V
GND → GND
DO  → D2

Buzzer
+ → D8
- → GND
</pre>

<h3>Working Principle</h3>
<p>
The vibration sensor outputs a digital signal when movement is detected. 
The Arduino reads this signal and determines if it exceeds a preset threshold. 
If triggered, the buzzer is activated to provide an immediate alert.
</p>

<h3>Key Features</h3>
<p>
• Instant vibration detection<br>
• Simple and low-cost design<br>
• Fast response alert system
</p>

<h3>Advantages</h3>
<p>
• Easy to implement<br>
• Low power consumption<br>
• Compact and portable
</p>

<h3>Limitations</h3>
<p>
• Cannot measure earthquake magnitude<br>
• Sensitive to noise and false triggers<br>
• Limited range of detection
</p>

<h3>Future Improvements</h3>
<p>
• Integration with IoT alert systems<br>
• Data logging and analysis<br>
• Multi-sensor network for accuracy<br>
• Mobile notifications
</p>
`;
}

document.getElementById("modal-body").innerHTML=content;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
