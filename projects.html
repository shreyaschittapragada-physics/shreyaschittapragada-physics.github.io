<!DOCTYPE html>
<html>
<head>
<title>Projects</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin:0;font-family:Segoe UI;background:#0a0f1c;color:#e5e7eb;
}

nav{
position:sticky;top:0;background:rgba(17,24,39,0.75);
backdrop-filter:blur(14px);
display:flex;justify-content:center;gap:20px;padding:14px;
}

nav a{color:#93c5fd;text-decoration:none;}

section{max-width:900px;margin:auto;padding:80px 20px;}

.card{
background:#111827;padding:18px;border-radius:14px;
border:1px solid #1f2937;margin-top:15px;
}

h2{color:#60a5fa;}

.reveal{opacity:0;transform:translateY(30px);transition:0.8s;}
.reveal.active{opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="achievements.html">Achievements</a>
<a href="projects.html">Projects</a>
<a href="goals.html">Goals</a>
</nav>

<section>

<h1 class="reveal">Projects</h1>

<div class="card reveal">
<h2>Smart Drainage System</h2>
<p>Arduino + ultrasonic sensors + GSM alerts + I2C communication.</p>
</div>

<div class="card reveal">
<h2>Buildathon Project</h2>
<p>National-level innovation challenge prototype.</p>
</div>

</section>

<script>
const o=new IntersectionObserver(e=>{
e.forEach(x=>{if(x.isIntersecting)x.target.classList.add("active")});
});
document.querySelectorAll(".reveal").forEach(e=>o.observe(e));
</script>

</body>
</html>
