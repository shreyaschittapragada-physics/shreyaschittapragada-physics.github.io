<!DOCTYPE html>
<html>
<head>
<title>Projects | Shreyas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #070b14;
    color: #e5e7eb;
    overflow-x: hidden;
}

/* NAV */
nav {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 22px;
    padding: 10px 18px;
    background: rgba(17, 24, 39, 0.55);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    z-index: 1000;
}

nav a {
    color: #93c5fd;
    text-decoration: none;
}

/* SECTION */
section {
    max-width: 900px;
    margin: auto;
    padding: 110px 20px;
}

/* CARDS */
.card {
    background: linear-gradient(145deg,#111827,#0b1220);
    padding: 18px;
    border-radius: 16px;
    border: 1px solid #1f2937;
    margin-top: 15px;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-6px);
    border-color: #3b82f6;
}

h2 { color: #60a5fa; }

/* REVEAL */
.reveal {
    opacity: 0;
    transform: translateY(60px) scale(0.97);
    filter: blur(10px);
    transition: all 1s cubic-bezier(0.2,0.8,0.2,1);
}

.reveal.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    z-index: 2000;
}

.modal-content {
    background: #111827;
    margin: 5% auto;
    padding: 22px;
    width: 90%;
    max-width: 800px;
    border-radius: 16px;
    border: 1px solid #1f2937;
}

.close {
    float: right;
    font-size: 26px;
    cursor: pointer;
    color: #93c5fd;
}

/* SVG wiring style */
svg {
    width: 100%;
    margin-top: 10px;
}

.wire {
    stroke: #60a5fa;
    stroke-width: 2;
}

.node {
    fill: #93c5fd;
}

.label {
    fill: #e5e7eb;
    font-size: 12px;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="achievements.html">Achievements</a>
<a href="projects.html">Projects</a>
<a href="goals.html">Goals</a>
<a href="blog.html">Blog</a>
</nav>

<section>

<h1 class="reveal">Projects</h1>

<div class="card reveal" onclick="openProject('drainage')">
<h2>Smart Drainage System</h2>
<p>Arduino + HC-SR04 + GSM + I2C</p>
</div>

<div class="card reveal" onclick="openProject('earthquake')">
<h2>Earthquake Detection System</h2>
<p>Arduino + Vibration Sensor</p>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<div id="modal-body"></div>
</div>
</div>

<script>

/* REVEAL */
const observer = new IntersectionObserver((entries) => {
entries.forEach((entry,i)=>{
if(entry.isIntersecting){
setTimeout(()=>entry.target.classList.add("active"),i*80);
}
});
},{threshold:0.12});

document.querySelectorAll(".reveal").forEach(e=>observer.observe(e));

/* OPEN PROJECT */
function openProject(type){

let content="";

if(type==="drainage"){
content=`
<h2>Smart Drainage System</h2>
<p><b>Real Wiring Schematic (Arduino Level)</b></p>

<svg viewBox="0 0 600 300">

<!-- Arduino -->
<rect x="250" y="120" width="100" height="60" fill="#1f2937" stroke="#60a5fa"/>
<text x="265" y="155" class="label">Arduino UNO</text>

<!-- Sensor -->
<circle cx="100" cy="100" r="15" class="node"/>
<text x="70" y="80" class="label">HC-SR04</text>

<!-- GSM -->
<circle cx="500" cy="100" r="15" class="node"/>
<text x="480" y="80" class="label">GSM</text>

<!-- Buzzer -->
<circle cx="100" cy="220" r="15" class="node"/>
<text x="80" y="200" class="label">Buzzer</text>

<!-- Wires -->
<line x1="115" y1="100" x2="250" y2="140" class="wire"/>
<line x1="350" y1="140" x2="485" y2="100" class="wire"/>
<line x1="300" y1="180" x2="100" y2="205" class="wire"/>

</svg>

<p><b>Pin Mapping:</b></p>
<pre>
HC-SR04 → Arduino
VCC → 5V
GND → GND
TRIG → D9
ECHO → D10

GSM Module:
TX → RX
RX → TX
VCC → 5V External
</pre>
`;
}

if(type==="earthquake"){
content=`
<h2>Earthquake Detection System</h2>

<p><b>Real Wiring Schematic</b></p>

<svg viewBox="0 0 600 250">

<!-- Arduino -->
<rect x="250" y="100" width="100" height="60" fill="#1f2937" stroke="#60a5fa"/>
<text x="265" y="135" class="label">Arduino UNO</text>

<!-- Sensor -->
<circle cx="120" cy="130" r="15" class="node"/>
<text x="80" y="110" class="label">Vibration</text>

<!-- Buzzer -->
<circle cx="480" cy="130" r="15" class="node"/>
<text x="460" y="110" class="label">Buzzer</text>

<!-- Wires -->
<line x1="135" y1="130" x2="250" y2="130" class="wire"/>
<line x1="350" y1="130" x2="465" y2="130" class="wire"/>

</svg>

<p><b>Pin Mapping:</b></p>
<pre>
Vibration Sensor:
VCC → 5V
GND → GND
DO → D2

Buzzer:
+ → D8
- → GND
</pre>
`;
}

document.getElementById("modal-body").innerHTML=content;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
