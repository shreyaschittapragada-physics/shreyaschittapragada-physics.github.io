<!DOCTYPE html>
<html>
<head>
<title>Projects | Shreyas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #070b14;
    color: #e5e7eb;
}

nav {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 22px;
    padding: 10px 18px;
    background: rgba(17, 24, 39, 0.55);
    backdrop-filter: blur(18px);
    border-radius: 999px;
    z-index: 1000;
}

nav a {
    color: #93c5fd;
    text-decoration: none;
}

section {
    max-width: 900px;
    margin: auto;
    padding: 110px 20px;
}

.card {
    background: linear-gradient(145deg,#111827,#0b1220);
    padding: 18px;
    border-radius: 16px;
    border: 1px solid #1f2937;
    margin-top: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    border-color: #3b82f6;
}

.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
}

.modal-content {
    background: #111827;
    margin: 5% auto;
    padding: 25px;
    width: 90%;
    max-width: 900px;
    border-radius: 16px;
}

.close {
    float: right;
    font-size: 26px;
    cursor: pointer;
}

img {
    width: 100%;
    max-width: 750px;
    border-radius: 12px;
    margin-top: 10px;
}

pre {
    background: #020617;
    padding: 12px;
    border-radius: 8px;
}

h3 { color: #93c5fd; }
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="projects.html">Projects</a>
</nav>

<section>

<h1>Projects</h1>

<div class="card" onclick="openProject('drainage')">
<h2>Smart Drainage System</h2>
<p>Dual Arduino + I2C + Ultrasonic + GSM</p>
</div>

<div class="card" onclick="openProject('earthquake')">
<h2>Earthquake Detection System</h2>
<p>Arduino + Vibration Sensor</p>
</div>

</section>

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<div id="modal-body"></div>
</div>
</div>

<script>

function openProject(type){

let content="";

if(type==="drainage"){
content=`
<h2>Smart Drainage System (Dual Arduino - I2C)</h2>

<p>
This system uses two Arduino boards communicating via I2C.
The first Arduino (Slave) measures water level using an ultrasonic sensor.
The second Arduino (Master) processes the data and triggers GSM alerts and buzzer.
</p>

<h3>System Architecture</h3>
<p>
• Slave Arduino → Sensor Processing  
• Master Arduino → Decision + GSM Alert  
• Communication via I2C (SDA, SCL)
</p>

<h3>Circuit Diagram</h3>
<div style="text-align:center;">
<img src="images/drainage.png">
</div>

<h3>Pin Connections</h3>
<pre>
ULTRASONIC (Slave Arduino)
VCC  → 5V
GND  → GND
TRIG → D9
ECHO → D10

I2C BETWEEN ARDUINOS
SDA → A4 (both)
SCL → A5 (both)
GND → Common

GSM (Master Arduino)
TX → D7 (RX)
RX → D6 (TX)
VCC → External 5V
GND → GND

BUZZER (Master)
+ → D8
- → GND
</pre>

<h3>Working Principle</h3>
<p>
The Slave Arduino continuously measures water level using ultrasonic sensing.
Data is sent via I2C to the Master Arduino.
If threshold is exceeded, Master triggers buzzer and sends SMS using GSM module.
</p>
`;
}

if(type==="earthquake"){
content=`
<h2>Earthquake Detection System</h2>

<p>
This system detects ground vibrations using a vibration sensor.
When vibration exceeds a threshold, a buzzer is activated.
</p>

<h3>Circuit Diagram</h3>
<div style="text-align:center;">
<img src="images/earthquake.png">
</div>

<h3>Pin Connections</h3>
<pre>
Vibration Sensor:
VCC → 5V
GND → GND
DO  → D2

Buzzer:
+ → D8
- → GND
</pre>

<h3>Working Principle</h3>
<p>
The vibration sensor detects motion and sends signal to Arduino.
If it crosses threshold, buzzer is activated.
</p>
`;
}

document.getElementById("modal-body").innerHTML=content;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
