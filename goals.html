<!DOCTYPE html>
<html>
<head>
<title>Goals</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Segoe UI;background:#070b14;color:#e5e7eb;}

nav{
position:sticky;top:0;background:rgba(17,24,39,0.7);
backdrop-filter:blur(14px);
display:flex;justify-content:center;gap:20px;padding:14px;
}

nav a{color:#93c5fd;text-decoration:none;}

section{max-width:900px;margin:auto;padding:80px 20px;}

.card{
background:#111827;
padding:18px;
border-radius:14px;
border:1px solid #1f2937;
margin-top:15px;
}

h2{color:#60a5fa;}

.reveal{
opacity:0;
transform:translateY(40px) scale(0.98);
filter:blur(6px);
transition:all 0.9s ease;
}

.reveal.active{
opacity:1;
transform:translateY(0) scale(1);
filter:blur(0);
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="achievements.html">Achievements</a>
<a href="projects.html">Projects</a>
<a href="goals.html">Goals</a>
<a href="blog.html">Blog</a>
</nav>

<section>

<h1 class="reveal">Goals</h1>

<div class="card reveal">
Physics (Astrophysics + Theoretical Physics)
</div>

<div class="card reveal">
MIT, Yale, Ivy League, IISc, and global physics programs
</div>

<div class="card reveal">
Research-level computational physics development
</div>

</section>

<script>
const o=new IntersectionObserver(e=>{
e.forEach(x=>{if(x.isIntersecting)x.target.classList.add("active")});
});
document.querySelectorAll(".reveal").forEach(e=>o.observe(e));
</script>

</body>
</html>
