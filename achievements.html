<!DOCTYPE html>
<html>
<head>
<title>Achievements | Shreyas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #070b14;
    color: #e5e7eb;
}

/* NAV */
nav {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 22px;
    padding: 10px 18px;
    background: rgba(17, 24, 39, 0.55);
    backdrop-filter: blur(18px);
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
}

/* SECTION */
section {
    max-width: 950px;
    margin: auto;
    padding: 100px 20px;
}

h1 {
    font-size: 36px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}

/* CARD */
.card {
    background: linear-gradient(145deg,#111827,#0b1220);
    padding: 18px;
    border-radius: 16px;
    border: 1px solid #1f2937;
    transition: 0.35s;
}

/* 🔥 Glow Hover */
.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 60px rgba(59,130,246,0.25);
    border-color: #3b82f6;
}

h2 {
    color: #60a5fa;
}

/* CLICKABLE ITEMS */
.item {
    background: #020617;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
    border: 1px solid #1f2937;
    cursor: pointer;
    transition: 0.25s;
}

.item:hover {
    border-color: #60a5fa;
    background: #0b1220;
}

/* REVEAL */
.reveal {
    opacity: 0;
    transform: translateY(60px) scale(0.97);
    filter: blur(10px);
    transition: all 1.1s cubic-bezier(0.2,0.8,0.2,1);
}

.reveal.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
}

.modal-content {
    background: #111827;
    margin: 5% auto;
    padding: 25px;
    width: 90%;
    max-width: 800px;
    border-radius: 16px;
}

.close {
    float: right;
    font-size: 26px;
    cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="achievements.html">Achievements</a>
<a href="projects.html">Projects</a>
<a href="goals.html">Goals</a>
<a href="blog.html">Blog</a>
</nav>

<section>

<h1 class="reveal">Achievements</h1>

<div class="grid">

<!-- AWARDS -->
<div class="card reveal">
<h2>🏆 Awards</h2>

<div class="item" onclick="openModal('ieo')">🥇 IEO Merit (Level 2)</div>
<div class="item" onclick="openModal('vssf')">🏆 Top ~100 VSSF</div>
<div class="item" onclick="openModal('allrounder')">🏅 Best All-Rounder Award</div>
<div class="item" onclick="openModal('football_award')">⚽ Football Runner-up</div>

</div>

<!-- PARTICIPATION -->
<div class="card reveal">
<h2>📌 Participation</h2>

<div class="item" onclick="openModal('science')">⚙️ CBSE Science Exhibition</div>
<div class="item" onclick="openModal('buildathon')">🏆 Buildathon 2026</div>
<div class="item" onclick="openModal('football')">⚽ CBSE Zonal Football</div>
<div class="item" onclick="openModal('ncc')">🎖️ NCC Cadet (2024–2026)</div>
<div class="item" onclick="openModal('millet')">🎭 Milletutopia Skit (HCU)</div>

</div>

</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<div id="modal-body"></div>
</div>
</div>

<script>

/* REVEAL */
const observer = new IntersectionObserver((entries) => {
entries.forEach((entry,i)=>{
if(entry.isIntersecting){
setTimeout(()=>entry.target.classList.add("active"),i*90);
}
});
},{threshold:0.12});

document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

/* MODAL CONTENT */
function openModal(type){

let content="";

/* AWARDS */
if(type==="ieo"){
content=`<h2>IEO Merit (Level 2)</h2>
<p>Achieved distinction in the International English Olympiad, demonstrating strong language and analytical skills.</p>`;
}

if(type==="vssf"){
content=`<h2>Top ~100 VSSF</h2>
<p>Ranked among top participants in VSSF, showcasing strong problem-solving ability.</p>`;
}

if(type==="allrounder"){
content=`<h2>Best All-Rounder Award</h2>
<p>Recognized for excellence in academics, sports, and extracurricular activities.</p>`;
}

if(type==="football_award"){
content=`<h2>Football Runner-up</h2>
<p>Secured runner-up position representing school in football competition.</p>`;
}

/* PARTICIPATION */
if(type==="science"){
content=`<h2>CBSE Science Exhibition</h2>
<p>Presented Arduino project using I2C communication.</p>`;
}

if(type==="buildathon"){
content=`<h2>Buildathon 2026</h2>
<p>Participated in innovation challenge focused on problem-solving and creativity.</p>`;
}

if(type==="football"){
content=`<h2>CBSE Zonal Football</h2>
<p>Represented school in inter-school football tournament.</p>`;
}

if(type==="ncc"){
content=`<h2>NCC Cadet</h2>
<p>Pursuing "A" Certificate (2024–2026), focusing on discipline and leadership.</p>`;
}

if(type==="millet"){
content=`<h2>Milletutopia Skit (HCU)</h2>
<p>Performed in inter-school skit promoting sustainability and millet awareness.</p>`;
}

document.getElementById("modal-body").innerHTML=content;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
