<!DOCTYPE html>
<html>
<head>
<title>Achievements</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #070b14;
    color: #e5e7eb;
}

/* NAV */
nav {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 22px;
    padding: 10px 18px;
    background: rgba(17, 24, 39, 0.55);
    backdrop-filter: blur(18px);
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
}

/* LAYOUT */
section {
    max-width: 950px;
    margin: auto;
    padding: 100px 20px;
}

h1 {
    font-size: 36px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}

/* CARD */
.card {
    background: linear-gradient(145deg,#111827,#0b1220);
    padding: 18px;
    border-radius: 16px;
    border: 1px solid #1f2937;
    transition: 0.35s;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.55);
    border-color: #3b82f6;
}

h2 {
    color: #60a5fa;
}

/* REVEAL */
.reveal {
    opacity: 0;
    transform: translateY(60px) scale(0.97);
    filter: blur(10px);
    transition: all 1.1s cubic-bezier(0.2,0.8,0.2,1);
}

.reveal.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
}

@media(max-width:768px){
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="achievements.html">Achievements</a>
<a href="projects.html">Projects</a>
<a href="goals.html">Goals</a>
<a href="blog.html">Blog</a>
</nav>

<section>

<h1 class="reveal">Achievements</h1>

<div class="grid">

<div class="card reveal">
<h2>🏆 Awards</h2>
<p>Best All-Rounder Award</p>
<p>IEO Merit (Level 2)</p>
<p>Top ~100 VSSF</p>
<p>Football Runner-up</p>
</div>

<div class="card reveal">
<h2>📌 Participation</h2>
<p>CBSE Science Exhibition (Arduino + I2C)</p>
<p>Buildathon 2026</p>
<p>CBSE Zonal Football</p>
<p>NCC Cadet (2024–2026)</p>
</div>

</div>

</section>

<script>
const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
            setTimeout(() => entry.target.classList.add("active"), i * 90);
        }
    });
}, { threshold: 0.12 });

document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
</script>

</body>
</html>
