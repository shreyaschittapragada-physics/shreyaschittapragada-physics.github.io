<!DOCTYPE html>
<html>
<head>
<title>Blog</title>

<style>
body{margin:0;font-family:Segoe UI;background:#070b14;color:#e5e7eb;}

nav{
position:fixed;top:14px;left:50%;transform:translateX(-50%);
display:flex;gap:22px;padding:10px 18px;
background:rgba(17,24,39,0.55);
backdrop-filter:blur(18px);
border-radius:999px;
}

nav a{color:#93c5fd;text-decoration:none;}

.container{max-width:900px;margin:auto;padding:100px 20px;}

.card{
background:#111827;
padding:18px;
border-radius:14px;
border:1px solid #1f2937;
margin-top:15px;
}

.reveal{
opacity:0;
transform:translateY(50px) scale(0.97);
filter:blur(8px);
transition:all 1s cubic-bezier(0.2,0.8,0.2,1);
}

.reveal.active{
opacity:1;
transform:translateY(0) scale(1);
filter:blur(0);
}

a{color:#93c5fd;text-decoration:none;}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="achievements.html">Achievements</a>
<a href="projects.html">Projects</a>
<a href="goals.html">Goals</a>
<a href="blog.html">Blog</a>
</nav>

<div class="container">

<h1 class="reveal">Blog</h1>

<div class="card reveal">
<a href="post1.html">SHM is an approximation</a>
</div>

</div>

<script>
const observer=new IntersectionObserver(e=>{
e.forEach(x=>{if(x.isIntersecting)x.target.classList.add("active")});
});
document.querySelectorAll(".reveal").forEach(e=>observer.observe(e));
</script>

</body>
</html>
