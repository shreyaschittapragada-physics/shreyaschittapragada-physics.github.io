<!DOCTYPE html>
<html>
<head>
<title>Blog</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Segoe UI;background:#070b14;color:#e5e7eb;}

nav{
position:sticky;top:0;background:rgba(17,24,39,0.7);
backdrop-filter:blur(14px);
display:flex;justify-content:center;gap:20px;padding:14px;
}

nav a{color:#93c5fd;text-decoration:none;}

.container{max-width:900px;margin:auto;padding:80px 20px;}

.card{
background:#111827;
padding:18px;
border-radius:14px;
border:1px solid #1f2937;
margin-top:15px;
}

.reveal{
opacity:0;
transform:translateY(40px) scale(0.98);
filter:blur(6px);
transition:all 0.9s ease;
}

.reveal.active{
opacity:1;
transform:translateY(0) scale(1);
filter:blur(0);
}

a{color:#93c5fd;text-decoration:none;}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="achievements.html">Achievements</a>
<a href="projects.html">Projects</a>
<a href="goals.html">Goals</a>
<a href="blog.html">Blog</a>
</nav>

<div class="container">

<h1 class="reveal">Blog</h1>

<div class="card reveal">
<a href="post1.html"><b>Why Simple Harmonic Motion is Only an Approximation</b></a>
<p>Limits of ideal physics models in real systems.</p>
</div>

</div>

<script>
const o=new IntersectionObserver(e=>{
e.forEach(x=>{if(x.isIntersecting)x.target.classList.add("active")});
});
document.querySelectorAll(".reveal").forEach(e=>o.observe(e));
</script>

</body>
</html>
