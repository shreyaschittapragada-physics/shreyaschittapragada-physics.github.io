<!DOCTYPE html>
<html>
<head>
<title>Shreyas | Physics Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #070b14;
    color: #e5e7eb;
    overflow-x: hidden;
}

/* NAV (premium glass) */
nav {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 22px;
    padding: 10px 18px;
    background: rgba(17, 24, 39, 0.55);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    z-index: 1000;
}

nav a {
    color: #93c5fd;
    text-decoration: none;
    font-size: 14px;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: #60a5fa;
    transition: 0.3s;
}

nav a:hover::after { width: 100%; }
nav a:hover { color: white; }

/* HERO (more depth + parallax feel) */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    background: radial-gradient(circle at 50% 30%, #1e3a8a, #070b14 70%);
    position: relative;
    overflow: hidden;
}

.glow {
    position: absolute;
    width: 600px;
    height: 600px;
    background: rgba(59,130,246,0.22);
    filter: blur(140px);
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    animation: float 6s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translate(-50%,0px); }
    50% { transform: translate(-50%,25px); }
}

h1 {
    font-size: 54px;
    margin: 0;
    letter-spacing: -1px;
}

p {
    color: #cbd5e1;
}

/* SECTIONS */
section {
    max-width: 900px;
    margin: auto;
    padding: 80px 20px;
}

/* CARDS */
.card {
    background: linear-gradient(145deg,#111827,#0b1220);
    padding: 18px;
    border-radius: 16px;
    border: 1px solid #1f2937;
    margin-top: 15px;
    transition: 0.35s ease;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.55);
    border-color: #3b82f6;
}

/* REVEAL (premium version) */
.reveal {
    opacity: 0;
    transform: translateY(60px) scale(0.97);
    filter: blur(10px);
    transition: all 1.1s cubic-bezier(0.2,0.8,0.2,1);
}

.reveal.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="achievements.html">Achievements</a>
<a href="projects.html">Projects</a>
<a href="goals.html">Goals</a>
<a href="blog.html">Blog</a>
</nav>

<div class="hero reveal">
    <div class="glow"></div>
    <h1>Astrophysics & Physics</h1>
    <p>Engineering • Theoretical Physics • Computational Thinking</p>
</div>

<section class="reveal">
    <div class="card">
        Exploring physics through computation, engineering systems, and astrophysical modeling.
    </div>
</section>

<script>
const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
            setTimeout(() => entry.target.classList.add("active"), i * 90);
        }
    });
}, { threshold: 0.12 });

document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
</script>

</body>
</html>
