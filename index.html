<!DOCTYPE html>
<html>
<head>
    <title>Shreyas | Physics Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #070b14;
            color: #e5e7eb;
            overflow-x: hidden;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(14px);
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 14px;
            border-bottom: 1px solid #1f2937;
        }

        nav a {
            color: #93c5fd;
            text-decoration: none;
        }

        nav a:hover { color: white; }

        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            background: radial-gradient(circle at top, #1e3a8a, #070b14 70%);
        }

        h1 { font-size: 48px; margin: 0; }

        section {
            max-width: 900px;
            margin: auto;
            padding: 80px 20px;
        }

        .card {
            background: #111827;
            padding: 18px;
            border-radius: 14px;
            border: 1px solid #1f2937;
            margin-top: 15px;
        }

        /* REVEAL */
        .reveal {
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            filter: blur(6px);
            transition: all 0.9s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="achievements.html">Achievements</a>
    <a href="projects.html">Projects</a>
    <a href="goals.html">Goals</a>
    <a href="blog.html">Blog</a>
</nav>

<div class="hero reveal">
    <h1>Astrophysics & Physics</h1>
    <p>Shreyas | Theoretical Physics • Engineering • Computational Thinking</p>
</div>

<section class="reveal">
    <div class="card">
        Exploring physics through computation, engineering, and astrophysical thinking.
    </div>
</section>

<script>
const observer = new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting)x.target.classList.add("active");
});
});
document.querySelectorAll(".reveal").forEach(e=>observer.observe(e));
</script>

</body>
</html>
